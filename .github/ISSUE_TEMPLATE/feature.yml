name: Feature
description: User-facing capability or product workflow
labels: ["type:feature", "status:ready"]
body:
  - type: dropdown
    id: project_boundary
    attributes:
      label: Project boundary confirmation
      description: Confirm this belongs in Map-APP, not the separate PICC-Web-App production repo.
      options:
        - Map-APP multi-tenant platform
        - PICC tenant context inside Map-APP
        - Cross-project context explicitly described below
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should the user be able to do from the running app?
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: User workflow
      description: UI flow, controls, states, errors, and success behavior.
    validations:
      required: true
  - type: textarea
    id: data
    attributes:
      label: Data, tenancy, and integrations
      description: If PICC is mentioned, say whether it is Map-APP tenant context or live PICC-Web-App production work. Production/deploy target should be `map-app-supabase`, not `picc-push`, unless explicitly cross-project.
  - type: textarea
    id: docs
    attributes:
      label: Product docs to update
      description: HANDOFF, WORK_REGISTRY, DATA_MODEL, API_CONTRACTS, tenant docs, or run report.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
