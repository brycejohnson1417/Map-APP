name: Bug
description: Broken behavior or production defect
labels: ["type:bug", "status:ready"]
body:
  - type: dropdown
    id: project_boundary
    attributes:
      label: Project boundary confirmation
      description: Confirm this belongs in Map-APP, not the separate PICC-Web-App production repo.
      options:
        - Map-APP multi-tenant platform
        - PICC tenant context inside Map-APP
        - Cross-project context explicitly described below
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken, where, and who is affected?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, URLs, logs, counts, timestamps, or reproduction steps.
  - type: textarea
    id: scope
    attributes:
      label: Scope and non-goals
      description: If PICC is mentioned, say whether this is Map-APP tenant work or live PICC-Web-App production triage. Production/deploy target should be `map-app-supabase`, not `picc-push`, unless explicitly cross-project.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
