name: Task
description: Docs, CI, infra, or bounded operational work
labels: ["type:task", "status:ready"]
body:
  - type: dropdown
    id: project_boundary
    attributes:
      label: Project boundary confirmation
      description: Confirm this belongs in Map-APP, not the separate PICC-Web-App production repo.
      options:
        - Map-APP multi-tenant platform
        - PICC tenant context inside Map-APP
        - Cross-project context explicitly described below
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: If PICC is mentioned, say whether this is Map-APP tenant context or live PICC-Web-App production triage. Production/deploy target should be `map-app-supabase`, not `picc-push`, unless explicitly cross-project.
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
  - type: textarea
    id: validation
    attributes:
      label: Validation
    validations:
      required: true
